name: Stanje net metering SLO
version: "0.1.0"
slug: mojelektro_mini
description: Minimal Mojelektro companion add-on for Home Assistant
url: https://github.com/kocbekju/ha-mojelektro-mini
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:flash
options:
  mojelektro_username: ""
  mojelektro_password: ""
  poll_interval_minutes: 60
  log_level: info
schema:
  mojelektro_username: str
  mojelektro_password: password
  poll_interval_minutes: "int(5,1440)"
  log_level: "list(trace|debug|info|notice|warning|error|fatal)"
